                        <Fld label="Max VD %">
                          <input type="number" step="0.25" style={inpG} value={st.vdMax||1.5} onChange={e=>setACDBSt(acdb.id,{vdMax:parseFloat(e.target.value)||1})}/>
                        </Fld>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
                        {[
                          {lbl:'TOTAL CAPACITY', val:`${fmt(totalCap,0)}A`, c:ampOk?T.green:'#ef4444', ok:ampOk},
                          {lbl:'VD %',           val:`${fmt(vdRes.vdPct,2)}%`, c:vdOk?T.green:T.amber, ok:vdOk},
                          {lbl:'POWER LOSS',     val:`${fmt(vdRes.plossW*selRuns/1000,3)}kW`, c:T.amber, ok:true},
                        ].map((item,i)=>(
                          <div key={i} style={{background:item.ok?'rgba(16,185,129,0.04)':'rgba(239,68,68,0.04)',
                            border:`1px solid ${item.ok?'rgba(16,185,129,0.12)':'rgba(239,68,68,0.12)'}`,
                            borderRadius:7,padding:'8px 10px',textAlign:'center'}}>
                            <MonoLbl style={{display:'block',fontSize:8,marginBottom:3}}>{item.lbl}</MonoLbl>
                            <RajVal size={14} color={item.c}>{item.val}</RajVal>
                          </div>
                        ))}
                      </div>
                      {selRuns>1&&(
                        <div style={{marginTop:8,padding:'4px 10px',background:'rgba(167,139,250,0.07)',
                          border:'1px solid rgba(167,139,250,0.18)',borderRadius:5,
                          fontFamily:monoFont,fontSize:9,color:T.violet}}>
                          ×{selRuns} RUNS · {fmt(iPerRun,1)}A per run
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </Sec>

    </div>
  );
}


// ─── PAGE 5: BREAKER SELECTION ────────────────────────────────────────────
function Page5({S, derived}) {
  const { acdbCalcs } = derived;

  function BrkCard({title, sub, c, color}) {
    const typeColor = c.type==='MCB'?T.accent:c.type==='MCCB'?T.violet:T.green;
    const accentCol = color==='blue'?T.accent:color==='amber'?T.amber:T.green;
    const bdColor   = color==='blue'?T.border:color==='amber'?T.borderY:T.borderG;
    return (
      <div style={{background:'rgba(0,6,18,0.9)',border:`1px solid ${bdColor}`,borderRadius:10,overflow:'hidden'}}>
        <div style={{padding:'10px 14px',borderBottom:`1px solid ${bdColor}`,background:`${color==='blue'?'rgba(0,212,255':color==='amber'?'rgba(251,191,36':'rgba(16,185,129'},0.02)`}}>
          <div style={{fontSize:12.5,fontWeight:600,color:accentCol}}>{title}</div>
          <MonoLbl style={{fontSize:8.5,marginTop:2}}>{sub}</MonoLbl>
        </div>
        <div style={{padding:13}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr auto 1fr',alignItems:'center',gap:4,padding:'8px 11px',background:'rgba(0,0,0,0.25)',borderRadius:8,marginBottom:13}}>
            {[{lbl:'RATED I',val:`${fmt(c.rawI,1)}A`},{arrow:'×1.25'},{lbl:'DESIGN I',val:`${fmt(c.designI,1)}A`},{arrow:'→'},{lbl:'NEED ≥',val:`${Math.ceil(c.designI)}A`}].map((item,i)=>
              item.arrow?<div key={i} style={{fontFamily:monoFont,fontSize:11,color:'rgba(100,180,255,0.15)',textAlign:'center'}}>{item.arrow}</div>:
              <div key={i} style={{textAlign:'center'}}><MonoLbl style={{display:'block',fontSize:7.5,marginBottom:2}}>{item.lbl}</MonoLbl><RajVal size={14} color={accentCol}>{item.val}</RajVal></div>
            )}
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 15px',borderRadius:9,border:`1.5px solid ${bdColor.replace('0.1','0.25').replace('0.15','0.25')}`,background:`${color==='blue'?'rgba(0,212,255':color==='amber'?'rgba(251,191,36':'rgba(16,185,129'},0.05)`}}>
            <div>
              <span style={{display:'inline-block',fontFamily:monoFont,fontSize:9,padding:'2px 9px',borderRadius:4,background:`rgba(${c.type==='MCB'?'0,212,255':c.type==='MCCB'?'167,139,250':'16,185,129'},0.1)`,border:`1px solid rgba(${c.type==='MCB'?'0,212,255':c.type==='MCCB'?'167,139,250':'16,185,129'},0.2)`,color:typeColor,letterSpacing:1,marginBottom:7}}>{c.type}</span>
              <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                <RajVal size={36} color={accentCol}>{c.size}</RajVal>
                <MonoLbl style={{color:'rgba(100,180,255,0.4)',fontSize:12}}>A</MonoLbl>
              </div>
              <MonoLbl style={{fontSize:9,marginTop:4}}>4-Pole · Auto-selected</MonoLbl>
            </div>
            <div style={{textAlign:'right'}}>
              <MonoLbl style={{display:'block',marginBottom:3}}>MARGIN</MonoLbl>
              <RajVal size={20} color={c.ok?c.margin<15?T.amber:T.green:'#ef4444'}>+{c.margin}%</RajVal>
              <div style={{marginTop:6}}><Tag ok={c.ok} warn={!c.ok}>{c.ok?'✓ VALID':'⚠ CHECK'}</Tag></div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  const invRows = S.inverters.map(inv=>({title:inv.name,sub:`${inv.rating}kW · ${inv.outVolt}V · PF ${inv.pf} · ${inv.qty}u`,c:calcBrk(inv.rating,inv.outVolt,inv.pf),color:'blue'}));
  const acdbRows = S.acdbs.filter(a=>(a.inverters||[]).length>0).map(acdb=>{const calc=acdbCalcs[acdb.id]||{totalKW:0,refVolt:400,refPF:0.99};return{title:acdb.name,sub:`${calc.totalKW}kW total · ${calc.refVolt}V`,c:calcBrk(calc.totalKW,calc.refVolt,calc.refPF||0.99),color:'amber'};});
  const ltKW=S.inverters.reduce((s,i)=>s+i.rating*i.qty,0);
  const ltVolt=S.inverters[0]?.outVolt||400;
  const ltPF=S.inverters[0]?.pf||0.99;
  const ltRow={title:'LT Panel Main Incomer',sub:`Total ${ltKW}kW · ${ltVolt}V · All ACDBs combined`,c:calcBrk(ltKW,ltVolt,ltPF),color:'green'};
  const allRows=[...invRows,...acdbRows,ltRow];

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:14,padding:'11px 16px',background:T.card,border:`1px solid ${T.border}`,borderRadius:10,marginBottom:20,flexWrap:'wrap'}}>
        {[{lbl:'FORMULA',val:'I = P / (√3 × V × PF) × 1.25'},{lbl:'MCB',val:'≤ 125A'},{lbl:'MCCB',val:'125–1600A'},{lbl:'ACB',val:'> 800A'},{lbl:'ALL RESULTS',val:'4-POLE'}].map((item,i)=>(
          <span key={i} style={{display:'flex',alignItems:'center',gap:7}}>
            {i>0&&<span style={{width:1,height:22,background:'rgba(0,212,255,0.1)',display:'inline-block',margin:'0 4px'}}/>}
            <MonoLbl style={{fontSize:9}}>{item.lbl}</MonoLbl>
            <span style={{fontFamily:monoFont,fontSize:10,color:T.accent,background:'rgba(0,212,255,0.07)',padding:'3px 10px',borderRadius:5,border:'1px solid rgba(0,212,255,0.14)'}}>{item.val}</span>
          </span>
        ))}
      </div>

      {invRows.length>0&&<Sec color="blue"><SecHdr color="blue">// INVERTER OUTPUT BREAKERS</SecHdr><div style={{padding:16,display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}>{invRows.map((b,i)=><BrkCard key={i} {...b}/>)}</div></Sec>}
      {acdbRows.length>0&&<Sec color="amber"><SecHdr color="amber">// ACDB INCOMER BREAKERS</SecHdr><div style={{padding:16,display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}>{acdbRows.map((b,i)=><BrkCard key={i} {...b}/>)}</div></Sec>}
      <Sec color="green"><SecHdr color="green">// LT PANEL MAIN INCOMER</SecHdr><div style={{padding:16,display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}><BrkCard {...ltRow}/></div></Sec>

      <Sec color="blue">
        <SecHdr color="blue">// PROTECTION SCHEDULE — COMPLETE SUMMARY</SecHdr>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:650}}>
            <thead><tr>{['COMPONENT','RATED I','DESIGN I (×1.25)','TYPE','POLES','SIZE','MARGIN','STATUS'].map(h=><th key={h} style={{fontFamily:monoFont,fontSize:9,color:'rgba(100,180,255,0.35)',letterSpacing:1,padding:'8px 14px',borderBottom:'1px solid rgba(0,212,255,0.07)',textAlign:'left',fontWeight:400,whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
            <tbody>
              {allRows.map((row,i)=>{
                const c=row.c;
                const typeColor=c.type==='MCB'?T.accent:c.type==='MCCB'?T.violet:T.green;
                return <tr key={i} style={{borderBottom:'1px solid rgba(0,212,255,0.04)'}}>
                  <td style={{padding:'9px 14px',fontSize:12.5,fontWeight:600,color:T.text}}>{row.title}</td>
                  <td style={{padding:'9px 14px',fontFamily:rajFont,fontSize:14,fontWeight:700,color:T.amber}}>{fmt(c.rawI,1)}A</td>
                  <td style={{padding:'9px 14px',fontFamily:rajFont,fontSize:14,fontWeight:700,color:T.amber}}>{fmt(c.designI,1)}A</td>
                  <td style={{padding:'9px 14px'}}><span style={{fontFamily:monoFont,fontSize:9,padding:'2px 8px',borderRadius:4,background:`rgba(${c.type==='MCB'?'0,212,255':c.type==='MCCB'?'167,139,250':'16,185,129'},0.08)`,border:`1px solid rgba(${c.type==='MCB'?'0,212,255':c.type==='MCCB'?'167,139,250':'16,185,129'},0.15)`,color:typeColor}}>{c.type}</span></td>
                  <td style={{padding:'9px 14px',fontFamily:monoFont,fontSize:10,color:'rgba(140,180,230,0.5)'}}>4P</td>
                  <td style={{padding:'9px 14px',fontFamily:rajFont,fontSize:15,fontWeight:700,color:T.accent}}>{c.size}A</td>
                  <td style={{padding:'9px 14px',fontFamily:rajFont,fontSize:14,fontWeight:700,color:c.ok?c.margin<15?T.amber:T.green:'#ef4444'}}>+{c.margin}%</td>
                  <td style={{padding:'9px 14px'}}><Tag ok={c.ok} warn={!c.ok}>{c.ok?'✓ OK':'⚠ REVIEW'}</Tag></td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </Sec>
    </div>
  );
}


// ─── PAGE 6: SUMMARY REPORT ────────────────────────────────────────────────
function Page6({S, derived}) {
  const { tf, gf, combos, acdbCalcs } = derived;

  const today = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  const totalDC   = S.modules.reduce((s,m)=>s+m.qty*m.watt/1000,0);
  const totalAC   = S.inverters.reduce((s,i)=>s+i.qty*i.rating,0);
  const totalMods = S.modules.reduce((s,m)=>s+m.qty,0);
  const totalInvUnits = S.inverters.reduce((s,i)=>s+i.qty,0);

  // ── BREAKER CALCS ──
  const invBreakers = S.inverters.map(inv=>({
    name:inv.name, sub:`${inv.qty}u · ${inv.outVolt}V`, ...calcBrk(inv.rating,inv.outVolt,inv.pf)
  }));
  const acdbBreakers = S.acdbs.filter(a=>(a.inverters||[]).length>0).map(acdb=>{
    const c = acdbCalcs[acdb.id]||{totalKW:0,refVolt:400,refPF:0.99};
    return {name:acdb.name, sub:`${c.totalKW}kW`, ...calcBrk(c.totalKW,c.refVolt,c.refPF||0.99)};
  });
  const ltBrk = {name:'LT Panel Main Incomer', sub:`Total ${totalAC}kW`, ...calcBrk(totalAC,S.inverters[0]?.outVolt||400,S.inverters[0]?.pf||0.99)};
  const allBreakers = [...invBreakers,...acdbBreakers,ltBrk];

  // ── AC CABLE LOSS CALCS ──
  let totalACLoss = 0;
  const acCableSummary = S.inverters.map(inv=>{
    const st      = S.acInvCableState[inv.id]||{len:50,vdMax:1.5,sel:null};
    const rawI    = (inv.rating*1000)/(Math.sqrt(3)*inv.outVolt*inv.pf);
    let selSqmm   = st.sel;
    if(!selSqmm){ for(const c of AC_CABLES){ const d=getBase(c.sqmm,S.acMat,S.acInst)*tf*gf; if(d>=rawI*1.25){selSqmm=c.sqmm;break;} } }
    let unitLoss=0, worstVD=0;
    for(let u=1;u<=inv.qty;u++){
      const uk=`${inv.id}_${u}`;
      const len=S.unitCableLen[uk]??st.len??50;
      const {vdPct,plossW}=selSqmm?acVD(selSqmm,rawI,len,inv.outVolt):{vdPct:0,plossW:0};
      unitLoss+=plossW;
      if(vdPct>worstVD) worstVD=vdPct;
    }
    totalACLoss+=unitLoss;
    return {name:inv.name, qty:inv.qty, sqmm:selSqmm, totalLossW:unitLoss, worstVD, avgLen:st.len};
  });

  // ── ACDB CABLE LOSS ──
  let totalACDBLoss = 0;
  const acdbCableSummary = S.acdbs.filter(a=>(a.inverters||[]).length>0).map(acdb=>{
    const st    = S.acdbCableState[acdb.id]||{sqmm:null,runs:1,len:80,vdMax:1.5};
    const calc  = acdbCalcs[acdb.id]||{totalKW:0,rawI:0,designI:0,refVolt:400};
    const iPerRun = calc.designI>0?(calc.designI/(st.runs||1)):0;
    const vdR   = (st.sqmm&&calc.designI>0)?acVD(st.sqmm,iPerRun,st.len,calc.refVolt):{vdV:0,vdPct:0,plossW:0};
    totalACDBLoss += vdR.plossW*(st.runs||1);
    return {name:acdb.name, sqmm:st.sqmm, runs:st.runs||1, lossW:vdR.plossW*(st.runs||1), vdPct:vdR.vdPct};
  });

  const grandTotalLoss = (totalACLoss+totalACDBLoss)/1000;
  const systemEffPct   = totalAC>0 ? Math.max(0,(1-grandTotalLoss/totalAC)*100) : 0;

  // ── WARNINGS ──
  const warnings = [];
  Object.entries(combos).forEach(([,c])=>{
    if(c.errVoc)    warnings.push({type:'err', msg:`${c.m.name} × ${c.inv.name}: String Voc (${fmt(c.strVocCold,1)}V) exceeds inverter max DC (${c.inv.maxDC}V)`});
    if(c.errMpptLo) warnings.push({type:'err', msg:`${c.m.name} × ${c.inv.name}: String Vmp hot (${fmt(c.strVmpHot,1)}V) below MPPT min (${c.inv.mpptMin}V)`});
    if(c.errMpptHi) warnings.push({type:'err', msg:`${c.m.name} × ${c.inv.name}: String Vmp STC (${fmt(c.strVmpSTC,1)}V) exceeds MPPT max (${c.inv.mpptMax}V)`});
    if(c.warnSPM)   warnings.push({type:'warn', msg:`${c.m.name} × ${c.inv.name}: Strings/MPPT (${c.strPerMppt}) exceeds max (${c.inv.maxSPM})`});
  });
  acCableSummary.forEach(r=>{ if(r.worstVD>2) warnings.push({type:'warn',msg:`${r.name}: Worst AC cable VD is ${fmt(r.worstVD,2)}% — check individual unit lengths`}); });
  allBreakers.forEach(b=>{ if(!b.ok) warnings.push({type:'warn',msg:`${b.name}: Breaker ${b.size}A may be undersized for design current ${fmt(b.designI,1)}A`}); });

  // ── PRINT HANDLER ──
  const handlePrint = () => {
    const style = document.createElement('style');
    style.id = 'print-style';
    style.textContent = `
      @media print {
        @page { size: A4; margin: 15mm 12mm; }
        body { background: white !important; color: #000 !important; font-family: Arial, sans-serif !important; }
        #sidebar-nav, #nav-buttons { display: none !important; }
        #print-report { display: block !important; }
        .no-print { display: none !important; }
        .print-section { page-break-inside: avoid; margin-bottom: 14px; }
        .print-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .print-table th { background: #1a3a5c !important; color: white !important; padding: 5px 8px; text-align: left; font-size: 9px; }
        .print-table td { padding: 5px 8px; border-bottom: 1px solid #ddd; font-size: 10px; }
        .print-table tr:nth-child(even) td { background: #f8f9fa; }
        .print-hdr { background: #0a2040 !important; color: white !important; padding: 8px 12px; margin-bottom: 6px; border-radius: 4px; }
        .print-hdr h2 { font-size: 11px; margin: 0; letter-spacing: 1px; color: white !important; }
        .print-stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 10px; }
        .print-stat { border: 1px solid #ccc; border-radius: 4px; padding: 8px; text-align: center; }
        .print-stat .val { font-size: 16px; font-weight: bold; color: #1a3a5c; }
        .print-stat .lbl { font-size: 8px; color: #666; text-transform: uppercase; }
        .warn-box { background: #fff8e1 !important; border: 1px solid #f59e0b; padding: 6px 10px; border-radius: 4px; font-size: 9px; color: #92400e; margin: 3px 0; }
        .err-box  { background: #fef2f2 !important; border: 1px solid #ef4444; padding: 6px 10px; border-radius: 4px; font-size: 9px; color: #991b1b; margin: 3px 0; }
        .tag-ok   { background: #d1fae5 !important; color: #065f46; padding: 1px 6px; border-radius: 3px; font-size: 8px; }
        .tag-warn { background: #fef3c7 !important; color: #92400e; padding: 1px 6px; border-radius: 3px; font-size: 8px; }
        .tag-err  { background: #fee2e2 !important; color: #991b1b; padding: 1px 6px; border-radius: 3px; font-size: 8px; }
      }
    `;
    document.head.appendChild(style);
    window.print();
    setTimeout(()=>{ const el=document.getElementById('print-style'); if(el) el.remove(); }, 1000);
  };

  // ── SCREEN CARD ──
  const SumCard = ({children, color='blue', style:st={}}) => (
    <div style={{background:T.card,border:`1px solid ${color==='blue'?T.border:color==='amber'?T.borderY:T.borderG}`,borderRadius:12,overflow:'hidden',marginBottom:16,...st}}>
      {children}
    </div>
  );
  const SumHdr = ({icon, title, color='blue'}) => {
    const ac = color==='blue'?T.accent:color==='amber'?T.amber:T.green;
    const bg = color==='blue'?'rgba(0,212,255,0.025)':color==='amber'?'rgba(251,191,36,0.025)':'rgba(16,185,129,0.025)';
    const bd = color==='blue'?'rgba(0,212,255,0.08)':color==='amber'?'rgba(251,191,36,0.08)':'rgba(16,185,129,0.08)';
    return (
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'11px 16px',borderBottom:`1px solid ${bd}`,background:bg}}>
        <span style={{fontSize:14}}>{icon}</span>
        <MonoLbl style={{color:ac,fontSize:10,letterSpacing:2}}>{title}</MonoLbl>
      </div>
    );
  };
  const TH = ({children,w}) => <th style={{fontFamily:monoFont,fontSize:8.5,color:'rgba(100,180,255,0.4)',letterSpacing:.8,padding:'7px 12px',borderBottom:'1px solid rgba(0,212,255,0.08)',textAlign:'left',fontWeight:400,whiteSpace:'nowrap',width:w}}>{children}</th>;
  const TD = ({children,c,mono,bold,center}) => <td style={{padding:'8px 12px',fontSize:12,color:c||T.text,fontFamily:mono?monoFont:'Inter,sans-serif',fontWeight:bold?700:400,textAlign:center?'center':'left',borderBottom:'1px solid rgba(0,212,255,0.04)'}}>{children}</td>;
  const TypeBadge = ({type}) => {
    const cl = type==='MCB'?T.accent:type==='MCCB'?T.violet:T.green;
    return <span style={{fontFamily:monoFont,fontSize:8.5,padding:'2px 7px',borderRadius:4,background:`rgba(${type==='MCB'?'0,212,255':type==='MCCB'?'167,139,250':'16,185,129'},0.08)`,border:`1px solid rgba(${type==='MCB'?'0,212,255':type==='MCCB'?'167,139,250':'16,185,129'},0.15)`,color:cl}}>{type}</span>;
  };

  return (
    <div>
      {/* PRINT BUTTON */}
      <div className="no-print" style={{display:'flex',justifyContent:'flex-end',marginBottom:20,gap:10}}>
        <button onClick={handlePrint}
          style={{display:'flex',alignItems:'center',gap:8,padding:'10px 22px',background:'transparent',
            border:'1px solid rgba(0,212,255,0.4)',borderRadius:9,color:T.accent,cursor:'pointer',
            fontFamily:rajFont,fontSize:14,fontWeight:700,letterSpacing:2,transition:'all .2s'}}
          onMouseOver={e=>{e.currentTarget.style.background='rgba(0,212,255,0.08)';e.currentTarget.style.borderColor='rgba(0,212,255,0.7)'}}
          onMouseOut={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor='rgba(0,212,255,0.4)'}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="5" width="12" height="9" rx="1.5" stroke="#00d4ff" strokeWidth="1.1"/>
            <path d="M5 5V2.5C5 2 5.5 1.5 6 1.5H10C10.5 1.5 11 2 11 2.5V5" stroke="#00d4ff" strokeWidth="1.1"/>
            <line x1="5" y1="10" x2="11" y2="10" stroke="#00d4ff" strokeWidth="1" strokeLinecap="round"/>
            <line x1="5" y1="12" x2="9" y2="12" stroke="#00d4ff" strokeWidth="1" strokeLinecap="round"/>
          </svg>
          PRINT / EXPORT PDF
        </button>
      </div>

      {/* ── SECTION 1: PROJECT INFO ── */}
      <SumCard color="blue">
        <SumHdr icon="◈" title="// 01 — PROJECT INFORMATION" color="blue"/>
        <div style={{padding:'14px 18px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:12}}>
          {[
            {lbl:'PROJECT NAME',    val:S.projectName||'—'},
            {lbl:'ENGINEER',        val:S.userName||'—'},
            {lbl:'SITE LOCATION',   val:S.location||'—'},
            {lbl:'DATE',            val:today},
          ].map((item,i)=>(
            <div key={i} style={{background:'rgba(0,0,0,0.2)',borderRadius:8,padding:'10px 13px'}}>
              <MonoLbl style={{display:'block',fontSize:8,marginBottom:5}}>{item.lbl}</MonoLbl>
              <div style={{fontSize:13,fontWeight:600,color:T.text}}>{item.val}</div>
            </div>
          ))}
        </div>
      </SumCard>

      {/* ── SECTION 2: SYSTEM OVERVIEW ── */}
      <SumCard color="blue">
        <SumHdr icon="⊞" title="// 02 — SYSTEM OVERVIEW" color="blue"/>
        <div style={{padding:'14px 18px',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:14}}>
          {[
            {lbl:'TOTAL DC CAPACITY',  val:fmt(totalDC,2),   unit:'kWp',  c:T.accent},
            {lbl:'TOTAL AC CAPACITY',  val:fmt(totalAC,1),   unit:'kW',   c:T.amber},
            {lbl:'DC / AC RATIO',      val:totalAC>0?fmt(totalDC/totalAC,3):'—', unit:'', c:T.green},
            {lbl:'TOTAL MODULES',      val:fmtI(totalMods),  unit:'pcs',  c:T.violet},
            {lbl:'INVERTER TYPES',     val:S.inverters.length, unit:'types', c:T.accent},
            {lbl:'INVERTER UNITS',     val:totalInvUnits,    unit:'units', c:T.amber},
            {lbl:'ACDB COUNT',         val:S.acdbs.length,   unit:'ACDBs', c:T.green},
            {lbl:'MODULE TYPES',       val:S.modules.length, unit:'types', c:T.violet},
          ].map((item,i)=>(
            <div key={i} style={{background:'rgba(0,0,0,0.2)',border:'1px solid rgba(0,212,255,0.06)',borderRadius:9,padding:'11px 14px'}}>
              <MonoLbl style={{display:'block',fontSize:8,marginBottom:4}}>{item.lbl}</MonoLbl>
              <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                <RajVal size={20} color={item.c}>{item.val}</RajVal>
                <MonoLbl style={{color:'rgba(100,180,255,0.25)',fontSize:8}}>{item.unit}</MonoLbl>
              </div>
            </div>
          ))}
        </div>
        {/* equipment list */}
        <div style={{padding:'0 18px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div>
            <MonoLbl style={{display:'block',marginBottom:8,color:T.amber}}>PV MODULES</MonoLbl>
            {S.modules.map(m=>(
              <div key={m.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 10px',background:'rgba(251,191,36,0.04)',border:'1px solid rgba(251,191,36,0.1)',borderRadius:7,marginBottom:5}}>
                <div><div style={{fontSize:12.5,fontWeight:600,color:T.text}}>{m.name}</div><MonoLbl style={{fontSize:8.5}}>{m.watt}Wp · Voc {m.voc}V · Vmp {m.vmp}V</MonoLbl></div>
                <RajVal size={14} color={T.amber}>{m.qty} pcs</RajVal>
              </div>
            ))}
          </div>
          <div>
            <MonoLbl style={{display:'block',marginBottom:8,color:T.accent}}>INVERTERS</MonoLbl>
            {S.inverters.map(inv=>(
              <div key={inv.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 10px',background:'rgba(0,212,255,0.04)',border:'1px solid rgba(0,212,255,0.08)',borderRadius:7,marginBottom:5}}>
                <div><div style={{fontSize:12.5,fontWeight:600,color:T.text}}>{inv.name}</div><MonoLbl style={{fontSize:8.5}}>{inv.rating}kW · {inv.outVolt}V · {inv.mpptCount} MPPTs</MonoLbl></div>
                <RajVal size={14} color={T.accent}>{inv.qty} u</RajVal>
              </div>
            ))}
          </div>
        </div>
      </SumCard>

      {/* ── SECTION 3: STRING SIZING ── */}
      <SumCard color="amber">
        <SumHdr icon="≋" title="// 03 — STRING SIZING SUMMARY" color="amber"/>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:700}}>
            <thead><tr>
              {['MODULE TYPE','INVERTER TYPE','N (mods/str)','TOTAL STRINGS','VOC COLD (V)','VMP STC (V)','STR/INV','STR/MPPT','STATUS'].map(h=><TH key={h}>{h}</TH>)}
            </tr></thead>
            <tbody>
              {Object.entries(combos).map(([key,c])=>{
                const sc = c.errVoc||c.errMpptLo||c.errMpptHi?'err':c.errVocSm||c.warnSPM?'warn':'ok';
                return (
                  <tr key={key}>
                    <TD><span style={{fontSize:12,fontWeight:600}}>{c.m.name}</span></TD>
                    <TD>{c.inv.name}</TD>
                    <TD c={T.accent} bold center>{c.N}</TD>
                    <TD c={T.amber} bold center>{c.totalStrings}</TD>
                    <TD c={c.errVoc?'#ef4444':T.amber} mono>{fmt(c.strVocCold,1)}</TD>
                    <TD c={T.green} mono>{fmt(c.strVmpSTC,1)}</TD>
                    <TD center>{c.strPerInv}</TD>
                    <TD c={c.warnSPM?T.amber:T.green} center>{c.strPerMppt}</TD>
                    <TD><Tag ok={sc==='ok'} warn={sc==='warn'} err={sc==='err'}>{sc==='ok'?'✓ VALID':sc==='warn'?'⚠ WARN':'✕ ERROR'}</Tag></TD>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </SumCard>

      {/* ── SECTION 4: AC CABLE SUMMARY ── */}
      <SumCard color="blue">
        <SumHdr icon="∿" title="// 04 — AC CABLE SUMMARY" color="blue"/>
        <div style={{overflowX:'auto',marginBottom:12}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:600}}>
            <thead><tr>
              {['INVERTER TYPE','UNITS','CABLE SIZE','AVG LENGTH (m)','WORST VD %','TOTAL LOSS (kW)','STATUS'].map(h=><TH key={h}>{h}</TH>)}
            </tr></thead>
            <tbody>
              {acCableSummary.map((r,i)=>(
                <tr key={i}>
                  <TD><span style={{fontSize:12,fontWeight:600}}>{r.name}</span></TD>
                  <TD center>{r.qty}</TD>
                  <TD c={T.accent} mono>{r.sqmm?`${r.sqmm} mm²`:'—'}</TD>
                  <TD center>{r.avgLen} m</TD>
                  <TD c={r.worstVD>2?T.amber:T.green} mono>{fmt(r.worstVD,2)}%</TD>
                  <TD c={T.amber} mono>{fmt(r.totalLossW/1000,3)}</TD>
                  <TD><Tag ok={r.worstVD<=2} warn={r.worstVD>2}>{r.worstVD<=2?'✓ OK':'⚠ CHECK'}</Tag></TD>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {acdbCableSummary.length>0&&(
          <div style={{padding:'0 18px 14px'}}>
            <MonoLbl style={{display:'block',marginBottom:8,color:T.green}}>ACDB FEEDER CABLES</MonoLbl>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr>{['ACDB','CABLE SIZE','RUNS','CABLE LENGTH','VD %','POWER LOSS'].map(h=><TH key={h}>{h}</TH>)}</tr></thead>

                {acdbCableSummary.map((r,i)=>(
                  <tr key={i}>
                    <TD><span style={{fontWeight:600,color:T.green}}>{r.name}</span></TD>
                    <TD c={T.accent} mono>{r.sqmm?`${r.sqmm} mm²`:'—'}</TD>
                    <TD c={T.violet} center>{r.runs}</TD>
                    <TD c={T.text} mono>{(S.acdbCableState[S.acdbs.find(a=>a.name===r.name)?.id]?.len||80)} m</TD>
                    <TD c={r.vdPct>2?T.amber:T.green} mono>{fmt(r.vdPct,2)}%</TD>

      {/* ── SECTION 5: BREAKER SCHEDULE ── */}
      <SumCard color="blue">
        <SumHdr icon="⚡" title="// 05 — PROTECTION SCHEDULE" color="blue"/>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:650}}>
            <thead><tr>
              {['COMPONENT','RATED I (A)','DESIGN I (A)','TYPE','POLES','SIZE (A)','MARGIN','STATUS'].map(h=><TH key={h}>{h}</TH>)}
            </tr></thead>
            <tbody>
              {allBreakers.map((b,i)=>(
                <tr key={i}>
                  <TD><span style={{fontSize:12,fontWeight:600}}>{b.name}</span><br/><MonoLbl style={{fontSize:8}}>{b.sub}</MonoLbl></TD>
                  <TD c={T.amber} mono>{fmt(b.rawI,1)}</TD>
                  <TD c={T.amber} mono>{fmt(b.designI,1)}</TD>
                  <TD><TypeBadge type={b.type}/></TD>
                  <TD c='rgba(140,180,230,0.5)' mono center>4P</TD>
                  <TD c={T.accent} bold>{b.size}</TD>
                  <TD c={b.ok?b.margin<15?T.amber:T.green:'#ef4444'} mono>+{b.margin}%</TD>
                  <TD><Tag ok={b.ok} warn={!b.ok}>{b.ok?'✓ OK':'⚠ REVIEW'}</Tag></TD>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </SumCard>

      {/* ── SECTION 6: LOSS SUMMARY ── */}
      <SumCard color="green">
        <SumHdr icon="◎" title="// 06 — LOSS SUMMARY" color="green"/>
        <div style={{padding:'14px 18px'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
            {[
              {lbl:'TOTAL AC CABLE LOSS',   val:`${fmt(totalACLoss/1000,3)} kW`,    c:T.amber},
              {lbl:'TOTAL ACDB CABLE LOSS', val:`${fmt(totalACDBLoss/1000,3)} kW`,  c:T.amber},
              {lbl:'COMBINED CABLE LOSS',   val:`${fmt(grandTotalLoss,3)} kW`,      c:'#ef4444'},
              {lbl:'SYSTEM CABLE EFFICIENCY',val:`${fmt(systemEffPct,2)}%`,         c:T.green},
            ].map((item,i)=>(
              <div key={i} style={{background:'rgba(0,0,0,0.2)',border:'1px solid rgba(16,185,129,0.08)',borderRadius:9,padding:'12px 14px',position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${item.c},transparent)`}}/>
                <MonoLbl style={{display:'block',fontSize:8,marginBottom:4}}>{item.lbl}</MonoLbl>
                <RajVal size={20} color={item.c}>{item.val}</RajVal>
              </div>
            ))}
          </div>
          {/* loss bar visual */}
          <div style={{padding:'12px 14px',background:'rgba(0,0,0,0.2)',border:'1px solid rgba(16,185,129,0.08)',borderRadius:9}}>
            <MonoLbl style={{display:'block',marginBottom:8,fontSize:9}}>CABLE LOSS BREAKDOWN</MonoLbl>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <MonoLbl style={{width:160,fontSize:9}}>INV → ACDB CABLE</MonoLbl>
              <div style={{flex:1,background:'rgba(255,255,255,0.04)',borderRadius:3,height:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${totalAC>0?Math.min(100,totalACLoss/1000/totalAC*100*20):0}%`,background:T.amber,borderRadius:3}}/>
              </div>
              <RajVal size={12} color={T.amber}>{fmt(totalACLoss/1000,3)} kW</RajVal>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <MonoLbl style={{width:160,fontSize:9}}>ACDB → LT PANEL</MonoLbl>
              <div style={{flex:1,background:'rgba(255,255,255,0.04)',borderRadius:3,height:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${totalAC>0?Math.min(100,totalACDBLoss/1000/totalAC*100*20):0}%`,background:T.green,borderRadius:3}}/>
              </div>
              <RajVal size={12} color={T.green}>{fmt(totalACDBLoss/1000,3)} kW</RajVal>
            </div>
          </div>
        </div>
      </SumCard>

      {/* ── SECTION 7: WARNINGS & ALERTS ── */}
      {warnings.length>0&&(
        <SumCard color="amber">
          <SumHdr icon="⚠" title="// 07 — WARNINGS & ALERTS" color="amber"/>
          <div style={{padding:'12px 18px'}}>
            {warnings.map((w,i)=>(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'8px 12px',
                background:w.type==='err'?'rgba(239,68,68,0.06)':'rgba(251,191,36,0.06)',
                border:`1px solid ${w.type==='err'?'rgba(239,68,68,0.18)':'rgba(251,191,36,0.18)'}`,
                borderRadius:7,marginBottom:6}}>
                <span style={{fontSize:13,flexShrink:0,marginTop:1}}>{w.type==='err'?'✕':'⚠'}</span>
                <span style={{fontSize:12,color:w.type==='err'?'#fca5a5':T.amber,lineHeight:1.5}}>{w.msg}</span>
              </div>
            ))}
          </div>
        </SumCard>
      )}
      {warnings.length===0&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 18px',
          background:T.card,border:`1px solid ${T.borderG}`,borderRadius:12,marginBottom:16}}>
          <Tag ok>✓ NO WARNINGS</Tag>
          <span style={{fontSize:13,color:'rgba(140,180,230,0.5)'}}>All design parameters are within acceptable limits</span>
        </div>
      )}

    </div>
  );
}


// ─── INITIAL STATE ────────────────────────────────────────────────────────
const INIT = {
  projectName:'', userName:'', location:'',
  modules:[{id:'M1',name:'Module Type 1',watt:550,voc:49.5,vmp:41.2,isc:13.90,imp:13.35,tCoVoc:-0.27,tCoIsc:0.05,tCoPmax:-0.35,qty:100}],
  inverters:[{id:'I1',name:'Inverter Type 1',rating:100,maxDC:1000,mpptMin:550,mpptMax:850,mpptCount:4,maxSPM:2,outVolt:400,pf:0.99,eff:98.5,qty:1}],
  modSeq:2, invSeq:2,
  tMin:5, tMax:70, safetyM:5,
  deletedCombos:[], stringOverrides:{},
  acMat:'copper', acInst:'air', acTemp:40, acTray:'perforated', acLayers:2, acCpt:3,
  dcCableState:{}, acInvCableState:{}, acdbCableState:{},
  acdbs:[], acdbSeq:0,
  // per-unit overrides: key = `${comboKey}_unitIdx` e.g. "M1_I1_3"
  unitStringN:{},      // {comboKey_unit -> N override} (legacy, kept for fallback)
  unitStringCount:{},  // {comboKey_unit -> strings override} (legacy, kept for fallback)
  unitConfigs:{},      // {comboKey_unit -> [{N, strings}, ...]} multi-config per unit
  // per-unit cable lengths: key = `${invTypeId}_${unit}` e.g. "I1_3"
  unitCableLen:{},     // {invTypeId_unit -> length}
};

// ─── MAIN APP (only navigation & shared state here) ──────────────────────
const NAV = [
  {label:'Project Setup', tag:'01'},
  {label:'Equipment',     tag:'02'},
  {label:'String Sizing', tag:'03'},
  {label:'Cable Sizing',  tag:'04'},
  {label:'Breakers',      tag:'05'},
  {label:'Summary',       tag:'06'},
];

function SolarApp() {
  const [S, setS] = useState(INIT);
  const [page, setPage] = useState(0);

  // stable updater — never recreated
  const upd = useCallback((key, val) => setS(prev=>({...prev,[key]:val})),[]);

  // ── DERIVED (memoized) ──────────────────────────────────────────────
  const derived = useMemo(()=>{
    const tf  = getTF(S.acTemp);
    const gf  = getGF(S.acTray, S.acLayers, S.acCpt);
    const sm  = 1-(S.safetyM/100);
    const combos = {};
    S.modules.forEach(m=>{
      S.inverters.forEach(inv=>{
        const key=`${m.id}_${inv.id}`;
        if(S.deletedCombos.includes(key)) return;
        const vocCold = m.voc*(1+(m.tCoVoc/100)*(S.tMin-25));
        const vmpHot  = m.vmp*(1+(m.tCoVoc/100)*(S.tMax-25));
        const effMax  = inv.maxDC*sm;
        const maxByVoc  = Math.floor(effMax/vocCold);
        const maxByMppt = Math.floor(inv.mpptMax/m.vmp);
        const minByMppt = Math.ceil(inv.mpptMin/vmpHot);
        const maxAllow = Math.min(maxByVoc,maxByMppt);
        const minAllow = minByMppt;
        let sugN=maxAllow;
        if(sugN<minAllow) sugN=0;
        if(sugN>0&&sugN%2!==0&&sugN-1>=minAllow) sugN--;
        const N = S.stringOverrides[key]??sugN;
        const totalStrings = N>0?Math.ceil(m.qty/N):0;
        const strPerInv    = inv.qty>0?Math.ceil(totalStrings/inv.qty):0;
        const strPerMppt   = inv.mpptCount>0?Math.ceil(strPerInv/inv.mpptCount):0;
        const strVocCold   = N*vocCold;
        const strVmpSTC    = N*m.vmp;
        const strVmpHot    = N*vmpHot;
        combos[key]={m,inv,N,sugN,minAllow,maxAllow,totalStrings,strPerInv,strPerMppt,
          strVocCold,strVmpSTC,strVmpHot,vocCold,vmpHot,effMax,
          errVoc:strVocCold>inv.maxDC, errVocSm:strVocCold>effMax,
          errMpptLo:strVmpHot<inv.mpptMin, errMpptHi:strVmpSTC>inv.mpptMax,
          warnSPM:strPerMppt>inv.maxSPM};
      });
    });
    // ACDB calcs
    const invUnitsMap={};
    S.inverters.forEach(inv=>{for(let i=1;i<=inv.qty;i++) invUnitsMap[`${inv.id}_${i}`]=inv;});
    const acdbCalcs={};
    S.acdbs.forEach(acdb=>{
      const totalKW=(acdb.inverters||[]).reduce((s,uid)=>{const inv=invUnitsMap[uid];return s+(inv?.rating||0);},0);
      const rawI=(acdb.inverters||[]).reduce((s,uid)=>{const inv=invUnitsMap[uid];if(!inv)return s;return s+(inv.rating*1000)/(Math.sqrt(3)*inv.outVolt*inv.pf);},0);
      const refInv=invUnitsMap[(acdb.inverters||[])[0]];
      acdbCalcs[acdb.id]={totalKW,rawI,designI:rawI*1.25,refVolt:refInv?.outVolt||400,refPF:refInv?.pf||0.99};
    });
    return{tf,gf,combos,acdbCalcs};
  },[S]);

  // PAGES array — these are the stable top-level functions, not lambdas
  const PAGES = [Page1, Page2, Page3, Page4, Page5, Page6];
  const CurrentPage = PAGES[page];

  const totalDC  = S.modules.reduce((s,m)=>s+m.qty*m.watt/1000,0);
  const totalAC  = S.inverters.reduce((s,i)=>s+i.qty*i.rating,0);
  const totalMods= S.modules.reduce((s,m)=>s+m.qty,0);

  return (
    <div style={{display:'flex',minHeight:'100vh',fontFamily:"'Inter',sans-serif",background:T.bg,color:T.text}}>
      {/* SIDEBAR */}
      <aside style={{width:220,flexShrink:0,background:T.sidebar,borderRight:`1px solid ${T.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'20px 18px 16px',borderBottom:'1px solid rgba(0,212,255,0.08)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:8,background:'#020e22',border:'1px solid rgba(0,212,255,0.3)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2L14 8.5L19 8.5L15 12.5L17 19L11 15.5L5 19L7 12.5L3 8.5L8 8.5Z" fill="#fbbf24"/><line x1="11" y1="16" x2="11" y2="20" stroke="#00d4ff" strokeWidth="1.2"/><rect x="7" y="20" width="8" height="1.5" rx="0.75" fill="#00d4ff" opacity="0.5"/></svg>
          </div>
          <div>
            <div style={{fontFamily:rajFont,fontSize:14,fontWeight:700,letterSpacing:2,color:'#fff'}}>SOLAR DESIGN</div>
            <div style={{fontFamily:monoFont,fontSize:8,color:T.accent,letterSpacing:2,marginTop:1}}>ENGINEER SUITE v2</div>
          </div>
        </div>
        <div style={{padding:'10px 18px',borderBottom:'1px solid rgba(0,212,255,0.06)',background:'rgba(0,212,255,0.03)'}}>
          <MonoLbl style={{display:'block',marginBottom:3}}>ACTIVE PROJECT</MonoLbl>
          <div style={{fontSize:12,color:'#a0c8f0',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{S.projectName||'Untitled Project'}</div>
        </div>
        <nav style={{flex:1,padding:'10px 0'}}>
          {NAV.map((n,i)=>(
            <button key={i} onClick={()=>setPage(i)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 18px',border:'none',cursor:'pointer',textAlign:'left',background:page===i?'rgba(0,212,255,0.06)':'transparent',color:page===i?T.accent:page>i?'rgba(0,212,255,0.5)':'rgba(140,180,230,0.35)',borderLeft:`2px solid ${page===i?T.accent:page>i?'rgba(0,212,255,0.2)':'transparent'}`,fontSize:12.5,fontWeight:page===i?600:400,transition:'all .15s'}}>
              <span style={{fontFamily:monoFont,fontSize:10,width:16,flexShrink:0}}>{n.tag}</span>
              <span>{n.label}</span>
              {page>i&&<span style={{marginLeft:'auto',fontSize:10,color:'rgba(0,212,255,0.4)'}}>✓</span>}
            </button>
          ))}
        </nav>
        <div style={{padding:'12px 18px',borderTop:'1px solid rgba(0,212,255,0.08)',background:'rgba(0,0,0,0.2)'}}>
          {[{l:'DC',v:`${fmt(totalDC,2)} kWp`},{l:'AC',v:`${totalAC}kW`},{l:'Modules',v:fmtI(totalMods)}].map((item,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <MonoLbl style={{fontSize:9}}>{item.l}</MonoLbl>
              <span style={{fontFamily:rajFont,fontSize:12,fontWeight:700,color:T.accent}}>{item.v}</span>
            </div>
          ))}
          <div style={{display:'flex',alignItems:'center',marginTop:8}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:T.accent,marginRight:5,animation:'blink 1.4s ease-in-out infinite'}}/>
            <MonoLbl style={{fontSize:9}}>SYSTEM ONLINE</MonoLbl>
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <main style={{flex:1,overflow:'auto',padding:'26px 30px 40px',maxWidth:1100}}>
        <div style={{marginBottom:22}}>
          <MonoLbl style={{color:T.accent,fontSize:10,letterSpacing:2,display:'block',marginBottom:4}}>// MODULE {NAV[page].tag} — {NAV[page].label.toUpperCase()}</MonoLbl>
          <h1 style={{fontFamily:rajFont,fontSize:24,fontWeight:700,color:'#fff',letterSpacing:1,margin:0}}>{NAV[page].label}</h1>
        </div>

        <CurrentPage S={S} setS={setS} upd={upd} derived={derived}/>

        <div style={{display:'flex',justifyContent:'space-between',marginTop:28,paddingTop:18,borderTop:'1px solid rgba(0,212,255,0.07)'}}>
          <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{padding:'9px 20px',borderRadius:8,border:'1px solid rgba(255,255,255,0.08)',background:'transparent',color:'rgba(140,180,230,0.4)',cursor:page===0?'not-allowed':'pointer',fontSize:13,fontFamily:rajFont,letterSpacing:1.5,opacity:page===0?0.35:1}}>← BACK</button>
          <span style={{fontFamily:monoFont,fontSize:11,color:T.muted,alignSelf:'center'}}>Page {page+1} of {NAV.length}</span>
          <button onClick={()=>setPage(p=>Math.min(NAV.length-1,p+1))} disabled={page===NAV.length-1} style={{padding:'9px 24px',borderRadius:8,border:'1px solid rgba(0,212,255,0.35)',background:'transparent',color:T.accent,cursor:page===NAV.length-1?'not-allowed':'pointer',fontSize:13,fontFamily:rajFont,fontWeight:700,letterSpacing:2,opacity:page===NAV.length-1?0.35:1}}>NEXT →</button>
        </div>
      </main>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(SolarApp));
  </script>
</body>
</html>
